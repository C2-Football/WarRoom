name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # reconai-shared/ is gitignored, so the bundled browser modules must be
      # regenerated from the canonical ReconAI source at deploy time — otherwise
      # the Pages artifact ships a stale (or missing) copy of supabase-client.js
      # and the other shared modules.
      - name: Checkout ReconAI shared source
        uses: actions/checkout@v4
        with:
          repository: C2-Football/ReconAI
          path: reconai-src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync ReconAI shared modules
        run: RECONAI_SHARED_SOURCE="$GITHUB_WORKSPACE/reconai-src/shared" npm run sync:shared

      - name: Build Pages artifact
        run: |
          set -euo pipefail
          mkdir -p pages-artifact
          cp -R \
            index.html landing.html onboarding.html login.html reset-password.html gift.html \
            free-agency.html draft-warroom.html trade-calculator.html draft-war-room team-comps \
            js css content reconai-shared icons *.js *.json *.webmanifest *.css *.png *.ico *.svg \
            pages-artifact/ 2>/dev/null || true
          rm -rf pages-artifact/**/.git pages-artifact/**/node_modules pages-artifact/**/supabase pages-artifact/**/tests

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "pages-artifact"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
